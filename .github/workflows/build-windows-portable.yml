name: Build Windows Portable EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build onedir EXE (portable)
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir --name DocumentMaskerOCR document_masker_ocr_gui.py

      - name: Pack portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/DocumentMaskerOCR/* -DestinationPath DocumentMaskerOCR_windows_portable_${{ github.ref_name }}.zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocumentMaskerOCR_windows_portable
          path: DocumentMaskerOCR_windows_portable_${{ github.ref_name }}.zip

      - name: Upload asset to release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DocumentMaskerOCR_windows_portable_${{ github.ref_name }}.zip
          fail_on_unmatched_files: true
